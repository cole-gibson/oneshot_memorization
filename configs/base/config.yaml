experiment_name: initial_experiment
seed: 0
device: auto

model:
  vocab_size: 100
  max_seq_len: 256
  embed_dim: 128
  num_heads: 1
  num_layers: 1
  mlp_ratio: 1
  mlp_num_layers: 3
  dropout: 0.0
  causal: true

data:
  num_distributions: 10_000
  num_states: 100
  alpha: 1.0
  zipf_exponent: 1.0
  batch_size: 128
  sequence_length: 257  # +1 for the target token

optimizer:
  lr: 0.0003
  weight_decay: 0.01
  betas: [0.9, 0.95]

training:
  max_iters: 50000
  grad_clip_norm: 1.0
  checkpoint_interval: 10

run:
  output_dir: /home/cg5763/data/output_oneshot_memorization
  resume_from:
