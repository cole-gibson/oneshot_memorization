experiment_name: bit_sequence_classifier
seed: 0
device: auto

run:
  output_dir: /home/cg5763/data/output_oneshot_memorization
  run_dir:
  resume_from:

data:
  type: zipf_bit_binary
  label_scheme: binary
  num_sequences: 20000
  sequence_length: 100
  zipf_exponent: 1.0
  batch_size: 256
  unique: true

model:
  type: bit_sequence_mlp
  sequence_length: 100
  num_classes: 2
  hidden_dim: 512
  num_hidden_layers: 2
  dropout: 0.0

optimizer:
  type: adam
  lr: 0.001
  betas: [0.9, 0.999]
  weight_decay: 0.0

training:
  max_iters: 10000
  compile: true
  report_interval: 1000
  checkpoint_interval: 5000
  grad_clip_norm:

evaluation:
  interval: 1000
  seed: 12345
  num_sequences: 20000
  microbatch_size: 50000
